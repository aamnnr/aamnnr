name: "Update GitHub Stats Cards (aamnnr)"

on:
  schedule:
    - cron: "0 3 * * *" # setiap hari jam 10 WIB
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Create images folder
        run: mkdir -p images

      # 🔥 Download Stats (pakai retry + silent fail check)
      - name: Download GitHub Stats Card
        run: |
          curl -fL --retry 3 --retry-delay 5 \
          "https://github-readme-stats.vercel.app/api?username=aamnnr&show_icons=true&theme=radical" \
          -o images/stats.svg || echo "Stats download failed"

      # 🔥 Download Top Languages
      - name: Download Top Languages Card
        run: |
          curl -fL --retry 3 --retry-delay 5 \
          "https://github-readme-stats.vercel.app/api/top-langs/?username=aamnnr&layout=compact&theme=radical" \
          -o images/top-langs.svg || echo "Langs download failed"

      # 🔥 Download Trophy
      - name: Download GitHub Trophy Card
        run: |
          curl -fL --retry 3 --retry-delay 5 \
          "https://github-profile-trophy.vercel.app/?username=aamnnr&theme=radical&no-frame=true&row=1&column=6" \
          -o images/trophy.svg || echo "Trophy download failed"

      # 🔥 Commit only if file exists & not empty
      - name: Commit and push images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add images/

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto-update stats cards"
            git push
          fi
